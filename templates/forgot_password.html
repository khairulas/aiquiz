{% extends "base.html" %}

{% block content %}
    <h1>Reset Password</h1>
    <p>Please enter the email address associated with your account. We will send you a link to reset your password.</p>

    <form method="POST" action="{{ url_for('forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required>
        </div>
        
        <button type="submit">Send Reset Link</button>
    </form>
    
    <p class="auth-switch" style="margin-top: 15px;">
        Remember your password? <a href="{{ url_for('login') }}">Login here</a>
    </p>
{% endblock %}
